apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: team3-ns
spec:
  parentRefs:
  - name: mahesh-kgateway
    namespace: team3-ns
  rules:
  - matches:
      - path:
          type: PathPrefix
          value: /
    backendRefs:
      - name: keycloak
        namespace: team3-ns
        port: 8080